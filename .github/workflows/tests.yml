name: Python Tests & Linting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Lint with pylint
      run: |
        pylint app.py core.py create_db.py documents_loaders/*.py --disable=all --enable=E,F 2>&1 | head -50 || true
    
    - name: Format check with black
      run: |
        black --check app.py core.py create_db.py documents_loaders/*.py 2>&1 || true
    
    - name: Import sorting with isort
      run: |
        isort --check-only app.py core.py create_db.py documents_loaders/*.py 2>&1 || true
    
    - name: Type checking with mypy
      run: |
        mypy app.py core.py create_db.py --ignore-missing-imports 2>&1 || true
    
    - name: Syntax validation
      run: |
        python -m py_compile app.py core.py create_db.py
        python -m py_compile documents_loaders/docs.py documents_loaders/test.py

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Bandit security check
      run: |
        pip install bandit
        bandit -r app.py core.py create_db.py documents_loaders/ -ll 2>&1 || true
